version: '3.8'

# Default logging configuration for all services
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # =============== DATABASES ===============
  campaign-db:
    image: postgres:14
    container_name: campaign-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: campaign_user
      POSTGRES_PASSWORD: campaign_pass
      POSTGRES_DB: campaign_db
    ports:
      - "5433:5432"
    volumes:
      - campaign-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campaign_user -d campaign_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: *default-logging
    networks:
      - scheduler-network

  redis:
    image: redis:7-alpine
    container_name: redis-dispatch
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging: *default-logging
    networks:
      - scheduler-network

  # =============== DJANGO CAMPAIGN MANAGER ===============
  django-app:
    build:
      context: ./campaign_manager
      dockerfile: Dockerfile
    container_name: django-campaign-manager
    restart: unless-stopped
    depends_on:
      campaign-db:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: myproject.settings
      DB_HOST: campaign-db
      DB_PORT: 5432
      DB_NAME: campaign_db
      DB_USER: campaign_user
      DB_PASSWORD: campaign_pass
      PYTHONUNBUFFERED: 1
      DJANGO_SUPERUSER_USERNAME: admin
      DJANGO_SUPERUSER_PASSWORD: admin123
      DJANGO_SUPERUSER_EMAIL: admin@example.com
      DEBUG: "True"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    logging: *default-logging
    networks:
      - scheduler-network

  # =============== AIRFLOW SCHEDULER ===============
  airflow-db:
    image: postgres:14
    container_name: airflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: *default-logging
    networks:
      - scheduler-network

  airflow-init:
    image: apache/airflow:2.7.1
    container_name: airflow-init
    restart: "no"
    depends_on:
      airflow-db:
        condition: service_healthy
    environment: &airflow-common-env
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
      AIRFLOW_UID: 50000
      AIRFLOW__CORE__FERNET_KEY: 'd6VjzXnYr5u8x/A?D*G-KaPdSgVkYp3s'
      AIRFLOW__WEBSERVER__SECRET_KEY: '5u8x/A?D(G+KbPeShVmYq3t6w9z$$C&F)'
      DJANGO_API_URL: http://django-app:8000
      LAYER1_API_URL: http://sms-layer1:8001
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      - ./airflow-sms-scheduler/dags:/opt/airflow/dags
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com 2>/dev/null || true
      "
    logging: *default-logging
    networks:
      - scheduler-network

  airflow-webserver:
    image: apache/airflow:2.7.1
    container_name: airflow-webserver
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-common-env
    volumes:
      - ./airflow-sms-scheduler/dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging: *default-logging
    networks:
      - scheduler-network

  airflow-scheduler:
    image: apache/airflow:2.7.1
    container_name: airflow-scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-common-env
    volumes:
      - ./airflow-sms-scheduler/dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
    command: scheduler
    logging: *default-logging
    networks:
      - scheduler-network

  # =============== KAFKA & ZOOKEEPER ===============
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    networks:
      - scheduler-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DELETE_TOPIC_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_MESSAGE_MAX_BYTES: 10485760
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 40s
    logging: *default-logging
    networks:
      - scheduler-network

  # =============== LAYER 1: COMMAND INGESTION ===============
  sms-layer1:
    build: ./campaign-commander
    container_name: sms-layer1
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      SERVICE_NAME: layer1
      LOG_LEVEL: INFO
      LOG_DIR: /app/logs/layer1
      LOG_RETENTION_DAYS: 7
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_COMMAND_TOPIC: sms-commands
      CAMPAIGN_MANAGER_URL: http://django-app:8000
      DJANGO_USERNAME: admin
      DJANGO_PASSWORD: admin123
      PYTHONUNBUFFERED: 1
    depends_on:
      kafka:
        condition: service_healthy
      django-app:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging: *default-logging
    networks:
      - scheduler-network

  # =============== LAYER 2: EXECUTION ENGINE ===============
  sms-layer2:
    build: ./campaign-executor
    container_name: sms-layer2
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      SERVICE_NAME: layer2
      LOG_LEVEL: INFO
      LOG_DIR: /app/logs/layer2
      LOG_RETENTION_DAYS: 7
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_COMMAND_TOPIC: sms-commands
      KAFKA_PROGRESS_TOPIC: sms-batch-started
      KAFKA_CONSUMER_GROUP: layer2-engine
      CAMPAIGN_MANAGER_URL: http://django-app:8000
      DJANGO_USERNAME: admin
      DJANGO_PASSWORD: admin123
      POSTGRES_DSN: postgresql://campaign_user:campaign_pass@campaign-db:5432/campaign_db
      REDIS_URL: redis://redis:6379/0
      REDIS_QUEUE_KEY: sms:dispatch:queue
      BATCH_SIZE: 50000
      MAX_QUEUE_SIZE: 500000
      PYTHONPATH: /app
      PYTHONUNBUFFERED: 1
      HEALTH_PORT: 8003
    # command: python -u main.py  # REMOVED - using Dockerfile CMD instead
    depends_on:
      kafka:
        condition: service_healthy
      campaign-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      django-app:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging: *default-logging
    networks:
      - scheduler-network

  # =============== LAYER 3: SMS SENDER ===============
  sms-layer3:
    build: ./sms-sender
    container_name: sms-layer3
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      SERVICE_NAME: layer3
      LOG_LEVEL: INFO
      LOG_DIR: /app/logs/layer3
      LOG_RETENTION_DAYS: 7
      REDIS_URL: redis://redis:6379/0
      REDIS_QUEUE_KEY: sms:dispatch:queue
      REDIS_RETRY_KEY: sms:retry:queue
      BATCH_SIZE: 1000
      MAX_TPS: 4000
      WORKER_COUNT: 4
      MAX_RETRIES: 3
      API_URL: http://mock-sms-provider:8003/api/send
      API_KEY: mock-provider-no-auth-needed
      API_TIMEOUT: 5
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_SEND_STATUS_TOPIC: sms-send-status
      KAFKA_DELIVERY_TOPIC: sms-delivery-status
      DJANGO_URL: http://django-app:8000
      DJANGO_USERNAME: admin
      DJANGO_PASSWORD: admin123
      PYTHONUNBUFFERED: 1
    command: python -u main.py
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mock-sms-provider:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging: *default-logging
    networks:
      - scheduler-network

  # =============== LAYER 4: STATUS UPDATER ===============
  sms-layer4:
    build: ./status-updater
    container_name: sms-layer4
    restart: unless-stopped
    ports:
      - "8004:8004"
    environment:
      SERVICE_NAME: layer4
      LOG_LEVEL: INFO
      LOG_DIR: /app/logs/layer4
      LOG_RETENTION_DAYS: 7
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_SEND_STATUS_TOPIC: sms-send-status
      KAFKA_DELIVERY_TOPIC: sms-delivery-status
      KAFKA_CONSUMER_GROUP: layer4-status-updater
      POSTGRES_HOST: campaign-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: campaign_db
      POSTGRES_USER: campaign_user
      POSTGRES_PASSWORD: campaign_pass
      DJANGO_URL: http://django-app:8000
      DJANGO_USERNAME: admin
      DJANGO_PASSWORD: admin123
      BATCH_SIZE: 1000
      BATCH_TIMEOUT_MS: 100
      WORKER_COUNT: 4
      MAX_DB_CONNECTIONS: 20
      PYTHONUNBUFFERED: 1
    command: python -u main.py
    depends_on:
      kafka:
        condition: service_healthy
      campaign-db:
        condition: service_healthy
      django-app:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging: *default-logging
    networks:
      - scheduler-network

  # =============== MONITORING ===============
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    depends_on:
      kafka:
        condition: service_healthy
    logging: *default-logging
    networks:
      - scheduler-network

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander
    restart: unless-stopped
    ports:
      - "8083:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on:
      - redis
    logging: *default-logging
    networks:
      - scheduler-network

  # =============== MOCK SMS PROVIDER ===============
  mock-sms-provider:
    build: ./mock-sms-provider
    container_name: mock-sms-provider
    restart: unless-stopped
    ports:
      - "8005:8003"
    environment:
      MOCK_SUCCESS_RATE: 0.98
      MOCK_RESPONSE_DELAY_MS: 50
      MOCK_RANDOM_FAILURES: "true"
      MOCK_API_PORT: 8003
      WEBHOOK_URL: http://sms-layer3:8002/webhook/delivery
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging: *default-logging
    networks:
      - scheduler-network

networks:
  scheduler-network:
    driver: bridge

volumes:
  airflow-postgres-data:
  campaign-postgres-data:
  redis-data:
  airflow-logs: