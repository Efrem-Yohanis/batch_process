version: '3.8'

# Default logging configuration for all services
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # =============== DATABASES ===============
  airflow-db:
    image: postgres:14
    container_name: airflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: *default-logging
    networks:
      - scheduler-network

  campaign-db:
    image: postgres:14
    container_name: campaign-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: campaign_user
      POSTGRES_PASSWORD: campaign_pass
      POSTGRES_DB: campaign_db
    ports:
      - "5433:5432"
    volumes:
      - campaign-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campaign_user -d campaign_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: *default-logging
    networks:
      - scheduler-network

  redis:
    image: redis:7-alpine
    container_name: redis-dispatch
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging: *default-logging
    networks:
      - scheduler-network

  # =============== DJANGO CAMPAIGN MANAGER ===============
  django-app:
    build:
      context: . 
      dockerfile: django_project/Dockerfile
    container_name: django-campaign-manager
    restart: unless-stopped
    command: >
      bash -c "
        echo 'Waiting for database...' &&
        sleep 5 &&
        python manage.py migrate --noinput &&
        echo ' Migrations complete' &&
        echo \"from django.contrib.auth import get_user_model; User = get_user_model(); User.objects.filter(username='admin').exists() or User.objects.create_superuser('admin', 'admin@example.com', 'admin123')\" | python manage.py shell &&
        python manage.py runserver 0.0.0.0:8000
      "
    depends_on:
      campaign-db:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: myproject.settings
      DB_HOST: campaign-db
      DB_PORT: 5432
      DB_NAME: campaign_db
      DB_USER: campaign_user
      DB_PASSWORD: campaign_pass
      PYTHONUNBUFFERED: 1
      DJANGO_SUPERUSER_USERNAME: admin
      DJANGO_SUPERUSER_PASSWORD: admin123
      DJANGO_SUPERUSER_EMAIL: admin@example.com
    ports:
      - "8000:8000"
    volumes:
      - ./django_project:/app
      - django-static:/app/staticfiles
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/admin"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    logging: *default-logging
    networks:
      - scheduler-network

  # =============== AIRFLOW SCHEDULER ===============
  airflow-init:
    image: apache/airflow:2.7.1
    container_name: airflow-init
    restart: "no"
    user: "0:0"
    depends_on:
      airflow-db:
        condition: service_healthy
    environment: &airflow-common-env
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
      AIRFLOW_UID: 50000
      AIRFLOW__CORE__FERNET_KEY: 'd6VjzXnYr5u8x/A?D*G-KaPdSgVkYp3s'
      AIRFLOW__WEBSERVER__SECRET_KEY: '5u8x/A?D(G+KbPeShVmYq3t6w9z$$C&F)'
      # Custom environment variables for SMS system
      DJANGO_API_URL: http://django-app:8000
      LAYER1_API_URL: http://sms-layer1:8001
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      - ./airflow-sms-scheduler/dags:/opt/airflow/dags
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com 2>/dev/null || true
      "
    logging: *default-logging
    networks:
      - scheduler-network

  airflow-webserver:
    image: apache/airflow:2.7.1
    container_name: airflow-webserver
    restart: unless-stopped
    user: "0:0"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-common-env
    volumes:
      - ./airflow-sms-scheduler/dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    logging: *default-logging
    networks:
      - scheduler-network

  airflow-scheduler:
    image: apache/airflow:2.7.1
    container_name: airflow-scheduler
    restart: unless-stopped
    user: "0:0"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-common-env
    volumes:
      - ./airflow-sms-scheduler/dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs
    command: scheduler
    logging: *default-logging
    networks:
      - scheduler-network

  # =============== KAFKA & ZOOKEEPER ===============
  zookeeper:
    image: wurstmeister/zookeeper:latest
    container_name: zookeeper
    restart: unless-stopped
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    networks:
      - scheduler-network

  kafka:
    image: wurstmeister/kafka:latest
    container_name: kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_ADVERTISED_HOST_NAME: kafka
      KAFKA_ADVERTISED_PORT: 9092
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CREATE_TOPICS: "sms-commands:3:1,sms-batch-started:3:1,sms-delivery-status:3:1,sms-retry:1:1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DELETE_TOPIC_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_MESSAGE_MAX_BYTES: 10485760
      KAFKA_REPLICA_FETCH_MAX_BYTES: 10485760
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 40s
    logging: *default-logging
    networks:
      - scheduler-network

  # =============== LAYER 1: COMMAND INGESTION ===============
  sms-layer1:
    build: ./send_sms_manage
    container_name: sms-layer1
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - SERVICE_NAME=layer1
      - LOG_LEVEL=INFO
      - LOG_DIR=/app/logs/layer1
      - LOG_RETENTION_DAYS=7
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_COMMAND_TOPIC=sms-commands
      - CAMPAIGN_MANAGER_URL=http://django-app:8000
      - DJANGO_USERNAME=test
      - DJANGO_PASSWORD=test
      - PYTHONUNBUFFERED=1
    volumes:
      # Use named volume for logs (no permission issues)
      - layer1-logs:/app/logs/layer1
      # Mount code - NOT read-only to allow reload
      - ./send_sms_manage:/app
    command: python -m uvicorn layer1_ingestion:app --host 0.0.0.0 --port 8001 --reload
    depends_on:
      kafka:
        condition: service_healthy
      django-app:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging: *default-logging
    networks:
      - scheduler-network

  # =============== LAYER 2: EXECUTION ENGINE ===============
  sms-layer2:
    build: ./send_sms_manage
    container_name: sms-layer2
    restart: unless-stopped
    ports:
      - "8003:8003"  # Health check port
    environment:
      - SERVICE_NAME=layer2
      - LOG_LEVEL=INFO
      - LOG_DIR=/app/logs/layer2
      - LOG_RETENTION_DAYS=7
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_COMMAND_TOPIC=sms-commands
      - KAFKA_PROGRESS_TOPIC=sms-batch-started
      - KAFKA_CONSUMER_GROUP=layer2-engine
      - CAMPAIGN_MANAGER_URL=http://django-app:8000
      - DJANGO_USERNAME=test
      - DJANGO_PASSWORD=test
      - POSTGRES_DSN=postgresql://campaign_user:campaign_pass@campaign-db:5432/campaign_db
      - REDIS_URL=redis://redis:6379/0
      - REDIS_QUEUE_KEY=sms:dispatch:queue
      - BATCH_SIZE=50000
      - MAX_QUEUE_SIZE=500000
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - HEALTH_PORT=8003
    volumes:
      # Use named volume for logs
      - layer2-logs:/app/logs/layer2
      # Mount code - NOT read-only for execution
      - ./send_sms_manage:/app
      # Mount django_project for access
      - ./django_project:/django_project
    command: python -u /app/layer2_queue_builder.py
    depends_on:
      kafka:
        condition: service_healthy
      campaign-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      django-app:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging: *default-logging
    networks:
      - scheduler-network

  # =============== LAYER 3: SMS SENDER ===============
  sms-layer3:
    build: ./send_sms_manage
    container_name: sms-layer3
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      - SERVICE_NAME=layer3
      - LOG_LEVEL=INFO
      - LOG_DIR=/app/logs/layer3
      - LOG_RETENTION_DAYS=7
      - REDIS_URL=redis://redis:6379/0
      - REDIS_QUEUE_KEY=sms:dispatch:queue
      - REDIS_RETRY_KEY=sms:retry:queue
      - BATCH_SIZE=1000
      - MAX_TPS=4000
      - WORKER_COUNT=4
      - MAX_RETRIES=3
      - RETRY_DELAY_1=60
      - RETRY_DELAY_2=300
      - RETRY_DELAY_3=900
      - API_URL=https://api.your-sms-provider.com/v1/send
      - API_KEY=your-actual-api-key-here
      - API_TIMEOUT=5
      - DJANGO_URL=http://django-app:8000
      - DJANGO_USERNAME=test
      - DJANGO_PASSWORD=test
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_DELIVERY_TOPIC=sms-delivery-status
      - PYTHONUNBUFFERED=1
    volumes:
      # Use named volume for logs
      - layer3-logs:/app/logs/layer3
      # Mount code - NOT read-only
      - ./send_sms_manage:/app
    command: python -u /app/layer3_sender.py
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      django-app:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging: *default-logging
    networks:
      - scheduler-network

  # =============== KAFKA UI (monitoring) ===============
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      KAFKA_CLUSTERS_0_TOPICS: sms-commands,sms-batch-started,sms-delivery-status
    depends_on:
      kafka:
        condition: service_healthy
    logging: *default-logging
    networks:
      - scheduler-network

  # =============== REDIS COMMANDER (Redis UI) ===============
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander
    restart: unless-stopped
    ports:
      - "8083:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      - redis
    logging: *default-logging
    networks:
      - scheduler-network

networks:
  scheduler-network:
    driver: bridge

volumes:
  # Named volumes for logs (managed by Docker, no permission issues)
  layer1-logs:
  layer2-logs:
  layer3-logs:
  airflow-logs:
  
  # Your existing volumes
  airflow-postgres-data:
  campaign-postgres-data:
  redis-data:
  django-static: