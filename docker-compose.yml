version: '3.8'

services:
  # --- DATABASES ---
  airflow-db:
    image: postgres:14
    container_name: airflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - scheduler-network

  campaign-db:
    image: postgres:14
    container_name: campaign-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: campaign_user
      POSTGRES_PASSWORD: campaign_pass
      POSTGRES_DB: campaign_db
    volumes:
      - campaign-postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campaign_user -d campaign_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - scheduler-network

  redis:
    image: redis:7-alpine
    container_name: redis-dispatch
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - scheduler-network

  # --- DJANGO APP ---
  django-app:
    build:
      context: . 
      dockerfile: django_project/Dockerfile
    container_name: django-campaign-manager
    restart: unless-stopped
    command: >
      bash -c "
        echo 'Waiting for database...' &&
        sleep 5 &&
        python manage.py migrate --noinput &&
        echo '✅ Migrations complete' &&
        python manage.py runserver 0.0.0.0:8000
      "
    depends_on:
      campaign-db:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: myproject.settings
      DB_HOST: campaign-db
      DB_PORT: 5432
      DB_NAME: campaign_db
      DB_USER: campaign_user
      DB_PASSWORD: campaign_pass
      PYTHONUNBUFFERED: 1
    ports:
      - "8000:8000"
    volumes:
      - ./django_project:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/admin"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - scheduler-network

  # --- AIRFLOW ---
  airflow-init:
    image: apache/airflow:2.7.1
    container_name: airflow-init
    restart: "no"
    user: "0:0"
    depends_on:
      airflow-db:
        condition: service_healthy
    environment: &airflow-common-env
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
      AIRFLOW_UID: 50000
      AIRFLOW__CORE__FERNET_KEY: ''
    volumes:
      - ./airflow-sms-scheduler/dags:/opt/airflow/dags
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com 2>/dev/null || true
      "
    networks:
      - scheduler-network

  airflow-webserver:
    image: apache/airflow:2.7.1
    container_name: airflow-webserver
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-common-env
    volumes:
      - ./airflow-sms-scheduler/dags:/opt/airflow/dags
      - ./airflow-sms-scheduler/logs:/opt/airflow/logs
    ports:
      - "8080:8080"
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - scheduler-network

  airflow-scheduler:
    image: apache/airflow:2.7.1
    container_name: airflow-scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment: *airflow-common-env
    volumes:
      - ./airflow-sms-scheduler/dags:/opt/airflow/dags
      - ./airflow-sms-scheduler/logs:/opt/airflow/logs
    command: scheduler
    networks:
      - scheduler-network

  # --- KAFKA & ZOOKEEPER ---
  zookeeper:
    image: wurstmeister/zookeeper:latest
    container_name: zookeeper
    restart: unless-stopped
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scheduler-network

  kafka:
    image: wurstmeister/kafka:latest
    container_name: kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_ADVERTISED_HOST_NAME: kafka
      KAFKA_ADVERTISED_PORT: 9092
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CREATE_TOPICS: "sms-commands:3:1,sms-batches:6:1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DELETE_TOPIC_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_MESSAGE_MAX_BYTES: 10485760
      KAFKA_REPLICA_FETCH_MAX_BYTES: 10485760
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks:
      - scheduler-network

  # --- CUSTOM LAYERS (send_sms_manage) ---
  sms-layer1:
    build: ./send_sms_manage
    container_name: sms-layer1
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PYTHONUNBUFFERED: 1
    volumes:
      - ./send_sms_manage:/app
    command: uvicorn layer1_ingestion:app --host 0.0.0.0 --port 8001 --reload
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - scheduler-network

  sms-slicer:
    build: ./send_sms_manage
    container_name: sms-slicer
    restart: unless-stopped
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379
      DJANGO_SETTINGS_MODULE: myproject.settings
      DB_HOST: campaign-db
      DB_PORT: 5432
      DB_NAME: campaign_db
      DB_USER: campaign_user
      DB_PASSWORD: campaign_pass
      PYTHONPATH: /app:/app/project_root
      PYTHONUNBUFFERED: 1
    volumes:
      - ./send_sms_manage:/app
      - .:/app/project_root
      - ./django_project:/app/django_project
    command: python -u layer2_queue_builder.py
    depends_on:
      kafka:
        condition: service_healthy
      campaign-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      django-app:
        condition: service_started
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - scheduler-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - scheduler-network

networks:
  scheduler-network:
    driver: bridge

volumes:
  airflow-postgres-data:
  campaign-postgres-data: